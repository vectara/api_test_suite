name: Validate Tests

on:
  push:
    paths:
      - "**/*.py"
      - "requirements.in"
      - "requirements.txt"
  pull_request:
    paths:
      - "**/*.py"
      - "requirements.in"
      - "requirements.txt"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.14"

      - name: Verify requirements.txt is in sync with requirements.in
        run: |
          pip install pip-tools
          pip-compile --generate-hashes --output-file=requirements.txt requirements.in
          if ! git diff --exit-code requirements.txt; then
            echo "::error::requirements.txt is out of sync with requirements.in. Run: pip-compile --generate-hashes --output-file=requirements.txt requirements.in"
            exit 1
          fi

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Collect tests and validate markers
        env:
          VECTARA_API_KEY: dummy-for-collection-only
        run: pytest tests/services/ --collect-only -q
